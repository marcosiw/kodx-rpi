name: CI

on:
  push:
    branches: ["**"]
    tags: ["v*.*.*"]
  pull_request:
    branches: ["main"]

env:
  DOTNET_VERSION: "10.0.x"

jobs:
  security:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Restore
        run: dotnet restore
      - name: Check for known vulnerable packages
        run: |
          set -o pipefail
          dotnet list package --vulnerable --include-transitive 2>&1 | tee vulnerable.log
          if grep -q "has the following vulnerable packages" vulnerable.log; then
            echo "Pacotes vulneráveis encontrados."
            exit 1
          fi

  test:
    name: Testes de unidade
    runs-on: ubuntu-latest
    needs: security
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Restore
        run: dotnet restore
      - name: Test
        run: dotnet test --configuration Release --no-restore

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Restore
        run: dotnet restore
      - name: Build
        run: dotnet build --configuration Release --no-restore

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v7
      - name: Build Docker image
        run: docker build -t kodx-rpi:${{ github.ref_name }} .
      # TODO: publicar a imagem e realizar o deploy na instância Linode
      # assim que o destino/registry e as credenciais forem definidos.
