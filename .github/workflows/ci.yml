name: CI

on:
  push:
    branches: ["**"]
    tags: ["v*.*.*"]

env:
  DOTNET_VERSION: "10.0.x"

jobs:
  security:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Restore
        run: dotnet restore
      - name: Check for known vulnerable packages
        run: |
          set -o pipefail
          dotnet list package --vulnerable --include-transitive 2>&1 | tee vulnerable.log
          if grep -q "has the following vulnerable packages" vulnerable.log; then
            echo "Pacotes vulneráveis encontrados."
            exit 1
          fi

  test:
    name: Testes de unidade
    runs-on: ubuntu-latest
    needs: security
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Restore
        run: dotnet restore
      - name: Test
        run: dotnet test --configuration Release --no-restore

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Restore
        run: dotnet restore
      - name: Build
        run: dotnet build --configuration Release --no-restore

  deploy:
    name: Publicar imagem
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
      - name: Login no GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Build e publicar imagem
        run: |
          IMAGE=ghcr.io/${{ github.repository }}
          docker build -t "$IMAGE:${{ github.ref_name }}" -t "$IMAGE:latest" .
          docker push "$IMAGE:${{ github.ref_name }}"
          docker push "$IMAGE:latest"
      # TODO: realizar o deploy na instância Linode (pull da imagem +
      # restart do serviço), depende de acesso/credenciais definidos.
