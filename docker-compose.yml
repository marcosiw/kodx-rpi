services:
  kodx-rpi-db:
    image: postgres:16
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=kodx_rpi
    ports:
      - "5432:5432"
    volumes:
      - kodx-rpi-pgdata:/var/lib/postgresql/data

  # Serviço opcional pra verificação local containerizada do mTLS (não é o deploy real
  # do Linode, que ainda não está automatizado — só reaproveita o mesmo padrão de
  # volume/env vars que esse deploy real vai precisar replicar).
  kodx-rpi-api:
    build: .
    depends_on: [kodx-rpi-db]
    ports:
      - "8080:8080"
      - "8081:8081"
    volumes:
      - ./certs:/app/certs:ro
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Grpc__Mtls__ServerCertificatePath=/app/certs/server.crt
      - Grpc__Mtls__ServerKeyPath=/app/certs/server.key
      - Grpc__Mtls__ClientCaCertificatePath=/app/certs/ca.crt
      - ApiKey__Value=local-dev-key
      - ConnectionStrings__Postgres=Host=kodx-rpi-db;Port=5432;Database=kodx_rpi;Username=postgres;Password=postgres
      - BlobStorage__ConnectionString=
volumes:
  kodx-rpi-pgdata:
